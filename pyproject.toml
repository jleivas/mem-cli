[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-recall"
version = "0.1.0"
description = "Local project memory and token observability for AI agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "agent-recall contributors" }
]
dependencies = [
  "typer==0.12.5",
  "rich==13.9.4",
]

[project.optional-dependencies]
dev = [
  "pytest==8.4.2",
]

[project.scripts]
agent-recall = "agent_recall.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
