name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-binary:
    name: Build binary (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: mem-darwin-arm64
          - os: ubuntu-latest
            asset: mem-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[release]"
          pip install -e "."

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Package binary
        run: tar -czf ${{ matrix.asset }}.tar.gz -C dist/mem .

      - name: Smoke test
        run: dist/mem/mem --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "
          import sys; sys.path.insert(0, 'scripts')
          from release_utils import latest_changelog_version
          print(latest_changelog_version())
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            artifacts/*.tar.gz \
            --title "mem-cli v${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/jleivas/homebrew-mem-cli.git tap
          python scripts/update_formula.py \
            "${{ steps.version.outputs.version }}" \
            artifacts/ \
            > tap/Formula/mem-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mem-cli.rb
          git commit -m "Update mem-cli to v${{ steps.version.outputs.version }}"
          git push
