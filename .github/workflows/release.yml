name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-binary:
    name: Build binary (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: mem-darwin-arm64
          - os: macos-latest
            asset: mem-darwin-amd64
          - os: ubuntu-latest
            asset: mem-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Intel binary: install universal2 Python from python.org and use it
      # via `arch -x86_64` so pip fetches x86_64 wheels and PyInstaller
      # produces an x86_64 binary — all running under Rosetta 2 on the ARM runner.
      - name: Install x86_64 Python (Intel binary only)
        if: matrix.asset == 'mem-darwin-amd64'
        run: |
          softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          curl -fsSL -o /tmp/py311.pkg \
            https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
          sudo installer -pkg /tmp/py311.pkg -target /
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 \
            --version

      - name: Install dependencies (ARM)
        if: matrix.asset != 'mem-darwin-amd64'
        run: |
          pip install --upgrade pip
          pip install -e ".[release]"
          pip install -e "."

      - name: Install dependencies (Intel x86_64 via Rosetta)
        if: matrix.asset == 'mem-darwin-amd64'
        run: |
          X86_PY="arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11"
          $X86_PY -m pip install --upgrade pip
          $X86_PY -m pip install -e ".[release]"
          $X86_PY -m pip install -e "."

      - name: Build binary (ARM)
        if: matrix.asset != 'mem-darwin-amd64'
        run: python scripts/build_binary.py

      - name: Build binary (Intel x86_64 via Rosetta)
        if: matrix.asset == 'mem-darwin-amd64'
        run: |
          arch -x86_64 \
            /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 \
            scripts/build_binary.py

      - name: Package binary
        run: tar -czf ${{ matrix.asset }}.tar.gz -C dist/mem .

      - name: Smoke test (ARM)
        if: matrix.asset != 'mem-darwin-amd64'
        run: dist/mem/mem --version

      - name: Smoke test (Intel x86_64 via Rosetta)
        if: matrix.asset == 'mem-darwin-amd64'
        run: arch -x86_64 dist/mem/mem --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "
          import sys; sys.path.insert(0, 'scripts')
          from release_utils import latest_changelog_version
          print(latest_changelog_version())
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping creation."
          else
            gh release create "$VERSION" \
              artifacts/*.tar.gz \
              --title "mem-cli $VERSION" \
              --generate-notes
          fi

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/jleivas/homebrew-mem-cli.git tap
          python scripts/update_formula.py \
            "${{ steps.version.outputs.version }}" \
            artifacts/ \
            > tap/Formula/mem-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mem-cli.rb
          git commit -m "Update mem-cli to v${{ steps.version.outputs.version }}"
          git push
